<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Mirjan Ali Sha</title>
    
    <!-- Meta Refresh Redirect -->
    <meta http-equiv="refresh" content="0; url=https://mirjanalisha.github.io/">
    <link rel="canonical" href="https://mirjanalisha.github.io/">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>Redirecting...</h1>
    <p>You are being redirected to your main portfolio at <a href="https://mirjanalisha.github.io/">mirjanalisha.github.io</a></p>
    <p>If you are not redirected automatically, <a href="https://mirjanalisha.github.io/">click here</a>.</p>

    <!-- JavaScript Fallback Redirect -->
    <script>
        window.location.href = "https://mirjanalisha.github.io/";
    </script>
</body>
</html>
